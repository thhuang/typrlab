<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>typr — Practice &amp; Settings Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="typr-tokens.css" />
<link rel="stylesheet" href="exploration.css" />
<style>
  html, body { margin: 0; height: 100%; }
  #root { height: 100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="practice-directions.jsx"></script>
  <script type="text/babel" src="settings-directions.jsx"></script>
  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="practice" title="Practice screen" subtitle="Three UX bets — same engine, different emphasis. All in One Dark (the default dark theme); switch palettes in the Color & Theme System.">
            <DCArtboard id="zen" label="A · Zen Focus — calm, flow-first, minimal chrome" width={1180} height={720}>
              <PracticeZen />
            </DCArtboard>
            <DCArtboard id="instrument" label="B · Instrument — always-on heatmap + full stat strip" width={1180} height={780}>
              <PracticeInstrument />
            </DCArtboard>
            <DCArtboard id="coach" label="C · Coach — the adaptive engine made visible" width={1180} height={780}>
              <PracticeCoach />
            </DCArtboard>
          </DCSection>

          <DCSection id="settings" title="Settings screen" subtitle="Two organizations of the real settings (target speed, unlocking, targeting, theme, font, cursor, data).">
            <DCArtboard id="twopane" label="A · Two-pane — category nav + pinned live preview" width={1180} height={640}>
              <SettingsTwoPane />
            </DCArtboard>
            <DCArtboard id="single" label="B · Single column — grouped, scannable, inline preview" width={720} height={940}>
              <SettingsSingleColumn />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
